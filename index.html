<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>生命数字密码</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-light:#E8D5A3;--gold-dim:#8B6E32;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;background:#0F0C07;font-family:'Noto Serif SC',serif;}
.bg-stars{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 50% 0%,#2A1F0A 0%,#0F0C07 60%);}
.bg-stars::before{content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 20%,rgba(201,168,76,.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 72% 8%,rgba(201,168,76,.5) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 85% 25%,rgba(201,168,76,.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 35%,rgba(201,168,76,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 55%,rgba(201,168,76,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 65%,rgba(201,168,76,.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 92% 70%,rgba(201,168,76,.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 28% 80%,rgba(201,168,76,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 90%,rgba(201,168,76,.4) 0%,transparent 100%);}
.screen{display:none;position:relative;z-index:1;min-height:100vh;padding:0 0 60px;}
.screen.active{display:block;}

/* INTRO */
#s0{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:40px 28px;animation:fadeIn .8s ease;}
.logo-ring{width:110px;height:110px;border-radius:50%;border:1px solid rgba(201,168,76,.4);
  display:flex;align-items:center;justify-content:center;margin-bottom:28px;position:relative;}
.logo-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid rgba(201,168,76,.15);}
.logo-ring::after{content:'';position:absolute;inset:-16px;border-radius:50%;border:1px dashed rgba(201,168,76,.08);}
.logo-num{font-family:'Playfair Display',serif;font-size:52px;color:var(--gold);font-style:italic;}
.intro-title{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold-light);text-align:center;line-height:1.3;margin-bottom:10px;}
.intro-sub{font-size:13px;color:rgba(201,168,76,.55);letter-spacing:.12em;text-align:center;margin-bottom:20px;}
.divider-orn{color:rgba(201,168,76,.3);font-size:18px;letter-spacing:8px;margin:8px 0 20px;}
.intro-desc{font-size:14px;color:rgba(242,234,216,.6);text-align:center;line-height:1.9;max-width:300px;margin-bottom:48px;}
.btn-start{width:220px;height:52px;border-radius:26px;
  background:linear-gradient(135deg,#C9A84C,#8B6E32);border:none;cursor:pointer;
  font-family:'Noto Serif SC',serif;font-size:16px;color:#1A1208;font-weight:600;
  letter-spacing:.1em;box-shadow:0 4px 24px rgba(201,168,76,.25);transition:opacity .2s,transform .15s;}
.btn-start:active{opacity:.85;transform:scale(.97);}

/* INPUT */
#s1{padding:50px 28px 80px;animation:slideUp .5s ease;}
.page-header{text-align:center;margin-bottom:36px;}
.page-header h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold-light);margin-bottom:6px;}
.page-header p{font-size:12px;color:rgba(201,168,76,.45);letter-spacing:.1em;}
.input-label{font-size:12px;color:rgba(201,168,76,.6);letter-spacing:.1em;margin-bottom:10px;display:block;}
.input-group{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;margin-bottom:28px;}
.field input,.name-field input{width:100%;height:52px;background:rgba(201,168,76,.07);
  border:1px solid rgba(201,168,76,.25);border-radius:8px;color:var(--gold-light);
  font-family:'Noto Serif SC',serif;font-size:17px;text-align:center;outline:none;
  transition:border-color .2s;-webkit-appearance:none;appearance:none;}
.field input:focus,.name-field input:focus{border-color:rgba(201,168,76,.6);}
.field input::placeholder,.name-field input::placeholder{color:rgba(201,168,76,.25);font-size:14px;}
.field-hint{text-align:center;font-size:11px;color:rgba(201,168,76,.35);margin-top:5px;}
.name-field{margin-bottom:28px;}
.name-field input{padding:0 16px;}
.ornament-line{display:flex;align-items:center;gap:12px;margin:32px 0 28px;}
.ornament-line::before,.ornament-line::after{content:'';flex:1;height:1px;
  background:linear-gradient(to right,transparent,rgba(201,168,76,.3),transparent);}
.ornament-line span{font-size:14px;color:rgba(201,168,76,.4);}
.btn-calc{width:100%;height:54px;border-radius:27px;
  background:linear-gradient(135deg,#C9A84C,#8B6E32);border:none;cursor:pointer;
  font-family:'Noto Serif SC',serif;font-size:17px;color:#1A1208;font-weight:600;
  letter-spacing:.12em;box-shadow:0 4px 24px rgba(201,168,76,.3);transition:opacity .2s,transform .15s;}
.btn-calc:active{opacity:.85;transform:scale(.98);}

/* RESULT */
#s2{padding:40px 20px 80px;animation:slideUp .5s ease;}
.result-hero{text-align:center;margin-bottom:32px;}
.result-name{font-size:15px;color:rgba(201,168,76,.6);letter-spacing:.12em;margin-bottom:16px;}
.num-showcase{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:18px;}
.num-bubble{width:72px;height:72px;border-radius:50%;background:rgba(201,168,76,.1);
  border:1px solid rgba(201,168,76,.4);display:flex;flex-direction:column;align-items:center;justify-content:center;}
.num-bubble.main{width:100px;height:100px;
  background:radial-gradient(circle at 40% 35%,rgba(201,168,76,.22),rgba(201,168,76,.06));
  border:1.5px solid var(--gold);box-shadow:0 0 30px rgba(201,168,76,.15),inset 0 0 20px rgba(201,168,76,.05);}
.num-big{font-family:'Playfair Display',serif;font-size:38px;color:var(--gold);}
.num-bubble.main .num-big{font-size:52px;}
.num-tag{font-size:9px;color:rgba(201,168,76,.5);letter-spacing:.05em;margin-top:1px;}
.arrow-div{font-size:18px;color:rgba(201,168,76,.3);}
.result-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold-light);margin-bottom:6px;}
.result-keyword{font-size:12px;color:rgba(201,168,76,.5);letter-spacing:.2em;}

/* CARDS */
.card{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.18);border-radius:12px;padding:20px;margin-bottom:14px;}
.card-title{font-size:11px;color:var(--gold);letter-spacing:.18em;margin-bottom:10px;font-weight:600;}
.card-text{font-size:14px;color:rgba(242,234,216,.78);line-height:1.9;}
.card-text strong{color:var(--gold-light);font-weight:600;}

.dual-card{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.18);border-radius:12px;padding:20px;margin-bottom:14px;}
.dual-card-title{font-size:11px;color:var(--gold);letter-spacing:.18em;margin-bottom:14px;font-weight:600;}
.dual-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.dual-col-label{font-size:10px;color:rgba(201,168,76,.5);letter-spacing:.1em;margin-bottom:6px;font-weight:600;}
.dual-col-text{font-size:13px;color:rgba(242,234,216,.72);line-height:1.85;}

.tags-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.tag{padding:4px 12px;border-radius:20px;font-size:11px;border:1px solid rgba(201,168,76,.3);
  color:rgba(201,168,76,.8);background:rgba(201,168,76,.08);}

.advice-list{list-style:none;}
.advice-list li{padding:13px 0;border-bottom:1px solid rgba(201,168,76,.1);
  font-size:14px;color:rgba(242,234,216,.72);line-height:1.8;display:flex;gap:12px;}
.advice-list li:last-child{border-bottom:none;}
.advice-num{font-family:'Playfair Display',serif;font-size:16px;color:var(--gold-dim);flex-shrink:0;padding-top:2px;}
.advice-body strong{display:block;color:var(--gold-light);font-size:14px;margin-bottom:4px;}
.advice-body span{font-size:13px;color:rgba(242,234,216,.62);}

.compat-label{font-size:10px;color:rgba(201,168,76,.4);letter-spacing:.1em;margin-top:12px;margin-bottom:6px;}
.compat-row{display:flex;gap:8px;flex-wrap:wrap;}
.compat-best{padding:5px 14px;border-radius:20px;font-size:12px;background:rgba(201,168,76,.15);
  border:1px solid rgba(201,168,76,.4);color:var(--gold-light);}
.compat-good{padding:5px 14px;border-radius:20px;font-size:12px;background:rgba(201,168,76,.07);
  border:1px solid rgba(201,168,76,.2);color:rgba(201,168,76,.7);}

.section-label{font-size:11px;color:rgba(201,168,76,.4);letter-spacing:.18em;text-align:center;margin:28px 0 16px;}

/* SHARE */
.share-card{border-radius:16px;overflow:hidden;position:relative;
  background:linear-gradient(160deg,#1A1208 0%,#0F0C07 50%,#1A1208 100%);
  border:1px solid rgba(201,168,76,.3);padding:32px 24px 28px;}
.share-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(201,168,76,.08) 0%,transparent 60%);pointer-events:none;}
.sc{position:absolute;width:24px;height:24px;border-color:rgba(201,168,76,.4);border-style:solid;}
.sc.tl{top:12px;left:12px;border-width:1px 0 0 1px;}
.sc.tr{top:12px;right:12px;border-width:1px 1px 0 0;}
.sc.bl{bottom:12px;left:12px;border-width:0 0 1px 1px;}
.sc.br{bottom:12px;right:12px;border-width:0 1px 1px 0;}
.share-app{font-size:10px;color:rgba(201,168,76,.4);letter-spacing:.2em;text-align:center;margin-bottom:14px;}
.share-n{font-family:'Playfair Display',serif;font-size:72px;color:var(--gold);line-height:1;text-align:center;}
.share-nl{font-size:11px;color:rgba(201,168,76,.55);letter-spacing:.15em;text-align:center;margin-bottom:8px;}
.share-name{font-family:'Playfair Display',serif;font-size:24px;color:var(--gold-light);text-align:center;margin-bottom:4px;}
.share-kw{font-size:12px;color:rgba(201,168,76,.55);letter-spacing:.2em;text-align:center;}
.sdiv{height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.3),transparent);margin:16px 0;}
.share-bubbles{display:flex;justify-content:center;gap:14px;margin:12px 0;}
.sb{width:46px;height:46px;border-radius:50%;border:1px solid rgba(201,168,76,.35);
  display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(201,168,76,.07);}
.sb-n{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);line-height:1;}
.sb-t{font-size:8px;color:rgba(201,168,76,.4);margin-top:1px;}
.share-quote{font-size:12px;color:rgba(201,168,76,.65);text-align:center;line-height:1.85;font-style:italic;padding:0 10px;margin-bottom:14px;}
.share-footer{text-align:center;font-size:10px;color:rgba(201,168,76,.3);letter-spacing:.1em;}
.btn-share{width:100%;height:50px;border-radius:25px;margin-top:14px;
  background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.4);
  color:var(--gold-light);font-family:'Noto Serif SC',serif;font-size:15px;
  cursor:pointer;letter-spacing:.08em;transition:background .2s;}
.btn-share:active{background:rgba(201,168,76,.2);}
.btn-again{width:100%;height:44px;border-radius:22px;margin-top:10px;
  background:transparent;border:1px solid rgba(201,168,76,.2);
  color:rgba(201,168,76,.5);font-family:'Noto Serif SC',serif;font-size:14px;cursor:pointer;}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:rgba(201,168,76,.9);color:#1A1208;padding:10px 22px;border-radius:20px;
  font-size:14px;font-weight:600;z-index:999;opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="bg-stars"></div>

<div class="screen active" id="s0">
  <div class="logo-ring"><span class="logo-num">∞</span></div>
  <div class="intro-title">生命数字密码</div>
  <div class="intro-sub">NUMEROLOGY · 命运解码</div>
  <div class="divider-orn">✦ ✦ ✦</div>
  <div class="intro-desc">每个人的生日，都藏着一段独特的宇宙密码。<br>数字揭示你的天赋、挑战与人生使命，<br>帮你看清自己，读懂他人。</div>
  <button class="btn-start" onclick="go(1)">开始解码 →</button>
</div>

<div class="screen" id="s1">
  <div class="page-header"><h2>输入你的生日</h2><p>请使用公历（阳历）日期</p></div>
  <span class="input-label">✦ 出生年月日</span>
  <div class="input-group">
    <div class="field"><input type="number" id="year" placeholder="年" inputmode="numeric"><div class="field-hint">年</div></div>
    <div class="field"><input type="number" id="month" placeholder="月" min="1" max="12" inputmode="numeric"><div class="field-hint">月</div></div>
    <div class="field"><input type="number" id="day" placeholder="日" min="1" max="31" inputmode="numeric"><div class="field-hint">日</div></div>
  </div>
  <span class="input-label">✦ 你的姓名（选填）</span>
  <div class="name-field"><input type="text" id="uname" placeholder="输入姓名，让解读更有温度"></div>
  <div class="ornament-line"><span>✦</span></div>
  <button class="btn-calc" onclick="calculate()">解码我的命运数字</button>
</div>

<div class="screen" id="s2"><div id="rc"></div></div>
<div class="toast" id="toast"></div>

<script>
const D={
1:{name:"独立·领袖",keyword:"开创 / 自我 / 太阳",tags:["天生开拓者","领袖气质","独立自主","勇于创新"],
core:`你是数字1——太阳的能量。独立、开创、强烈的自我意志是你最鲜明的标记。你天生走在前面，对新领域有着近乎本能的开拓冲动，不需要别人推着走，自己就是那个发动引擎的人。<br><br>你的内心有一种执念：<strong>事情如果要做，就要以最好的方式做到。</strong>这种驱动力让你在竞争中往往脱颖而出，但也容易让你在关系和合作中显得固执、难以妥协。`,
gift:"领导力天然，不是学来的，而是骨子里带来的。你能在混乱中看清方向，在他人犹豫时果断决策。开创性强，最适合做第一个吃螃蟹的人——无论是事业还是人生选择。",
shadow:"固执是你最大的绊脚石。你相信自己的判断，有时甚至到了听不进他人建议的程度。当你孤注一掷时，旁边那些声音未必是干扰，有时是你看不见的风险预警。",
relation:`在关系中你是主导者，充满活力与魅力。伴侣或朋友身边有你，往往感到很有安全感，但有时也会感到窒息——因为你的"我来安排"有时越过了界。<br><br><strong>最适合与拥有独立性、能欣赏你能力的人相处。</strong>你需要的不是崇拜者，而是能与你并肩的人。`,
career:"创业、领导、先锋型角色是你的主场。销售、创业、管理、军事、体育竞技——任何需要第一名的领域，都是你的舞台。你在需要独立决策、开拓新局的岗位上如鱼得水。",
wealth:"你的财富来自主动出击而非守成。敢于冒险是你的优势，但需防范因过于自信而忽视风险。财运高峰通常在你敢于独立决策、走出舒适区之后出现。",
cb:["3","5","7"],cg:["2","9"],
advice:[{t:"练习倾听，而非等待说话的机会",b:"你的直觉通常对，但他人的视角能让你避开盲区。每天至少一次，先听完再表达。"},{t:"允许自己依赖他人",b:"独立是美德，但孤立是消耗。允许团队承担，不是软弱，而是更聪明的力量分配。"},{t:"选定方向，深耕到底",b:"你有开创力，但容易在一件事成功后想去开创下一件。选一个核心领域，做到无可替代。"},{t:"把「必须赢」换成「想要成长」",b:"当你把竞争心转化为成长心，你的能量会更持久，关系也会更顺畅。"}],
quote:"世界需要开拓者，而你生来就是。"},

2:{name:"合作·感知",keyword:"关系 / 直觉 / 月亮",tags:["共情力超强","天生协调者","细腻敏感","直觉精准"],
core:`你是数字2——月亮的能量。情感细腻，直觉灵敏，天生能感知他人的需求与情绪，常常在对方开口之前，你已经知道他们想要什么。<br><br>你是团队中最不可或缺的粘合剂。不是最显眼的那个，却往往是最被需要的那个。<strong>你的力量不在于锋芒，而在于深度。</strong>`,
gift:"沟通与倾听能力出类拔萃，能让对方感到真正被理解。你是天生的调解者，在冲突中能找到双方都能接受的出口。细节观察力极强，能察觉到别人忽视的微妙信号。",
shadow:"你最大的挑战是对他人认可的依赖。当外界反馈不佳时，你的内心会比别人震荡更大。优柔寡断也是你的课题——因为你总能看见每一面，所以很难果断选择。",
relation:`你在关系中是最用心、最细腻的那一个。你记得对方说过的细节，感知他们的情绪变化，主动付出。<br><br>但要注意：<strong>过度付出而不表达需求，最终会积累成无声的委屈。</strong>你值得被同样细腻地对待——让对方知道你也有需要，不是负担，而是真正亲密的开始。`,
career:"心理咨询、人力资源、外交、设计、教育、医疗护理——任何需要细腻感知与沟通协调的领域，你都能做到极致。你是任何团队中情绪智商最高的那个人。",
wealth:"你的财富往往通过合作与关系网络而来，而非单打独斗。与他人建立真诚的连接，是你最大的隐性资产。避免因过于谦让而低估自己的价值。",
cb:["4","8","6"],cg:["1","3"],
advice:[{t:"建立内在稳定感",b:"你的安全感不该来自他人的态度。每天给自己五分钟，问：今天我为自己做了什么？"},{t:"学会说「不」",b:"你的边界是对自己的尊重，也是对关系的保护。拒绝不会让你失去爱，反而让人更珍视你。"},{t:"练习独立做决定",b:"哪怕是小事——今天吃什么、先做哪个任务——都主动决定，而不是问别人。这会积累真实的自我信心。"},{t:"表达你的需求",b:"你擅长满足他人，但常常忘记告诉别人你需要什么。说出来，不是脆弱，是真正的连接。"}],
quote:"真正的力量，是在感受一切的同时，依然站稳自己。"},

3:{name:"创意·表达",keyword:"创造 / 社交 / 木星",tags:["创意无限","口才出众","社交达人","艺术天赋"],
core:`你是数字3——木星的能量。充满创意与表达欲，思维跳跃，语言有感染力，走进任何房间都能点亮气氛。你不只是在表达，你是在<strong>创造体验</strong>——让别人因为你的存在而感到更生动。<br><br>你内心有一个永不停歇的创意引擎，想法比时间多，灵感比执行多。`,
gift:"创造力丰富、口才出众、社交能量强。你能在短时间内与陌生人建立连接，把复杂的想法用生动有趣的方式传递出去。艺术、写作、演讲——你在任何表达场域都能找到自己的节奏。",
shadow:"三分钟热度和注意力分散是你的老朋友。你开始的项目比完成的多三倍。情绪化时容易言过其实，事后又懊悔。深度有时被你的广度所掩盖。",

core:`你是数字4——土星的能量。稳定、秩序、踏实是你的核心基因。你是把梦想变成现实的那个人——当别人还在高谈阔论时，你已经在制定计划、落实步骤。<br><br><strong>团队里有你，大家才真正踏实。</strong>你不是最耀眼的那颗星，但你是让整个系统运转的那根轴。`,
gift:"执行力强，计划性出色，能把复杂的目标拆解为可操作的步骤。你是天生的项目管理者，擅长在混乱中建立秩序，把不可能变成已完成。",
shadow:"过于保守是你最大的限制。当变化来临，你的第一反应是抗拒而非适应。对安全感的需求有时让你错失真正的机遇。刻板和固执也可能让周围的人感到窒息。",
relation:`你在关系中忠诚、可靠、稳定，是对方最坚实的后盾。但有时你的实际主义会让关系缺少浪漫与惊喜——你很难理解为什么要"无缘无故"制造惊喜。<br><br><strong>你需要的是能欣赏你踏实的人，同时你也要试着偶尔打破自己的计划，给生活留一点即兴的空间。</strong>`,
career:"工程、建筑、金融、法律、项目管理、制造业——需要精准、严谨、长期执行的领域，你天生在行。你不适合朝令夕改、缺乏结构的工作环境。",
wealth:"你的财富来自稳定积累，而非一夜暴富。长期投资、踏实经营是你的财富路径。避免被\"快速致富\"的机会吸引——那通常是你财运的陷阱，而非机遇。",
cb:["2","6","8"],cg:["1","7"],
advice:[{t:"每月主动拥抱一次变化",b:"哪怕是换一条上班路线、尝试一道没吃过的菜。小小的主动改变，能逐渐软化对变化的恐惧。"},{t:"区分「谨慎」和「恐惧」",b:"谨慎是评估风险后的选择；恐惧是还没评估就先拒绝。下次说\"不\"之前，先问：我是在分析，还是在逃避？"},{t:"多表达情感，不只是行动",b:"你的爱是默默去做事，但伴侣和朋友有时需要的是听你说出来。说出你的感受，而不只是用行动证明。"},{t:"相信过程中的混乱是正常的",b:"不是所有事都能按计划进行。当计划失控时，不是失败的信号，而是调整的契机。"}],
quote:"大厦之稳，来自你这样的人。"},

5:{name:"自由·冒险",keyword:"变化 / 感官 / 水星",tags:["适应力极强","热爱自由","思维灵活","天生销售"],
core:`你是数字5——水星的能量。自由、变化与感官体验是你的命脉。你渴望体验生命的每一种可能性，不愿被任何一个标签或框架锁定。<br><br>你是天生的探险家——不只是地理上的，更是思想上的。<strong>你的世界里没有"不可能"，只有"还没试过"。</strong>`,
gift:"适应能力极强，能在任何环境快速找到自己的节奏。思维灵活，沟通天才，天生的销售与谈判高手。你能感知场域的变化，在别人还没反应过来时，你已经调整好了方向。",
shadow:"厌倦是你的宿敌。当新鲜感消退，你就开始坐立不安，寻找下一个刺激。对承诺的恐惧，让你有时错失真正深度的关系和事业。",
relation:`你的魅力让人着迷，初期的关系总是充满火花。但当关系进入稳定期，你开始感到"困住了"——这是你最需要面对的功课。<br><br><strong>真正的自由，不是不承诺，而是在承诺之内依然感到自由。</strong>找到那个让你自由呼吸又愿意扎根的人，是你人生最重要的功课之一。`,
career:"销售、旅游、媒体、公关、创业、自由职业——需要灵活适应、快速沟通、跨界整合的领域是你的乐园。朝九晚五、重复单一的工作会让你窒息。",
wealth:"你的财富机会多、来得快，但也可能去得快。善用你的感知力捕捉机遇，但要建立一个稳定的财务底盘——把每次的收益留出一部分作为不动的储备。",
cb:["1","3","7"],cg:["5","9"],
advice:[{t:"在核心领域建立「自由边界」",b:"给自己设定一个不变的核心（比如一个主业、一段关系），其余保持灵活。根基越稳，你飞得越远。"},{t:"允许自己慢下来，体验深度",b:"你习惯了广度，但深度体验——一本书反复读、一个人真正了解——会给你意想不到的满足感。"},{t:"把「厌倦」当作信号，而不是行动指令",b:"当厌倦来临，先问自己：是这件事真的没价值了，还是我只是需要换一个角度？"},{t:"建立简单的财务规则并坚守",b:"比如每月固定储蓄一个比例。这不是束缚，是让你的冒险更有底气的安全网。"}],
quote:"真正的冒险者，知道何时该停下来，扎根生长。"},

core:`你是数字6——金星的能量。爱、责任与关怀是你的核心驱动力。你不只是在"帮助"别人，你是真心觉得照顾好身边的人是自己的使命。<br><br><strong>你是那个让别人感到安全的人。</strong>你的存在本身，就是一种温暖的力量。`,
gift:"极强的同理心，能真正感受到他人的痛苦与需要。善于创造和谐的环境，化解冲突，让团队或家庭凝聚在一起。你在服务型角色中会发出最耀眼的光。",

relation:`你在关系中是最温柔的守护者，把对方照顾得无微不至。但这也带来一个风险：<strong>你把太多的自我价值绑定在"被需要"上。</strong>当对方独立了，或不再需要你的照顾，你会感到失落甚至嫉妒。<br><br>真正的爱，是让对方自由生长，同时自己也持续成长。`,
career:"医疗、心理咨询、教育、社会工作、设计、家庭服务——任何滋养生命、创造美与和谐的领域，你都能做到极致。",

cb:["2","4","9"],cg:["3","6"],
advice:[{t:"把「照顾自己」列为每日首要任务",b:"在照顾他人之前，先问自己：我今天吃好了吗？睡够了吗？有没有做一件让自己开心的事？"},{t:"设立清晰的边界，温柔地坚守",b:"说\"我现在没办法帮这个\"不是冷漠，而是诚实。边界是爱自己，也是尊重关系。"},{t:"接受他人的照顾，让自己被接住",b:"当有人想为你做些什么，允许自己接受，而不是立刻说\"不用了我自己来\"。被照顾，也是一种练习。"},{t:"区分「关心」和「控制」",b:"出于爱的过度介入，有时会变成对方的压力。信任他人有能力照顾自己的人生，是另一种更深的爱。"}],
quote:"你给世界的温柔，同样值得被温柔以待。"},

7:{name:"智慧·探索",keyword:"内省 / 灵性 / 海王星",tags:["洞察力深邃","哲学思考者","直觉精准","独立内省"],
core:`你是数字7——海王星的能量。深邃、内省、对真相有强烈的渴求。你不满足于表面的答案，你要追问到最底层的本质。<br><br>你是天生的哲学家与探索者，看到他人看不见的层次。<strong>你的内心世界，比外在世界更广阔、更丰富。</strong>`,
gift:"分析力强，思维深刻，有天生的直觉洞察力。你能在数据、现象或对话中发现常人忽视的规律与真相。在研究、哲学、心理、科技领域往往有独特建树。",
shadow:"过于封闭是你最深的限制。你不轻易信任，不轻易开口，这保护了你，却也把真正亲密的可能性隔在了门外。悲观与孤独有时是你的伴侣，你甚至会觉得\"别人不可能理解我\"。",
relation:`你的内心世界极为丰富，但你给他人看到的，往往只是冰山一角。这让亲近你的人感到有距离——他们想了解你，但总像隔着一层玻璃。<br><br><strong>真正的亲密，需要你愿意打开那扇内心的门。</strong>不必把一切都说出来，但试着让一个你信任的人，真正走进来。`,

wealth:"你对金钱的态度较为超脱，不以财富为核心驱动力。但这也可能让你在财务规划上比较被动。建立一个简单而自动化的财务系统，让钱的事情少占用你宝贵的心智资源。",

8:{name:"权力·财富",keyword:"成就 / 物质 / 土星",tags:["领导力极强","商业嗅觉敏锐","掌控全局","成就驱动"],
core:`你是数字8——土星最强的表达。权力、财富与成就是你的主旋律。你天生懂得驾驭资源，看清结构，在任何系统中都能找到杠杆点。<br><br>你不是为了平凡而来的。<strong>你内心深处知道，自己可以做成一些别人认为很难的事。</strong>而你通常是对的。`,
gift:"领导能力与商业嗅觉天然。你能看清一件事的本质结构，找到最有效的切入点。在资源调配、战略决策、驾驭权力结构方面，你往往比别人快半步。",
shadow:"控制欲是你最大的阴影面。你对\"事情必须按正确方式运行\"有强烈的执念，这容易让你在关系和团队中变得强势甚至专制。过于注重物质成就，有时会让你忽视情感与内心的需要。",
relation:`你在关系中是强有力的保护者和提供者，给伴侣安全感和稳定。但你的主导欲有时让亲密的人感到喘不过气——他们被保护，却没有被真正听见。<br><br><strong>你最需要学习的，是放手。</strong>不是放弃，而是相信身边的人有能力照顾好自己，你不必永远是那个撑着所有人的人。`,
career:"商业、金融、管理、投资、战略咨询、房地产——任何需要驾驭大局与资源、追求成果的舞台，都是你施展的地方。你在大系统里越能发挥，越容易走到高位。",
wealth:`8号人的财富往往经历明显的起伏——不是平稳积累，而是<strong>大起大落</strong>。这不是坏事，而是你的人生结构。每一次低谷背后通常藏着更大的反弹，关键是在低谷时不因焦虑做出冲动决策。你的财富与权力紧密相连——当你掌握更多决策权时，财富自然随之增长。`,
cb:["2","4","6"],cg:["1","8"],
advice:[{t:"把成功的定义扩展到物质之外",b:"关系的质量、内心的平静、身体的健康——这些同样是你值得投入的\"财富\"。每季度评估一次：这四个维度，哪个被你忽视了？"},{t:"练习放权，这是另一种掌控",b:"有意识地把某些决定权交给身边的人，观察结果。你会发现这不是失控，而是更聪明的能量分配。"},{t:"表达你内心的柔软",b:"你的外壳让人以为你刀枪不入。但你其实也有疲惫、困惑和不确定。试着在最信任的关系里，说出来——这会让那段关系更深。"},{t:"把身体管理当成重要事项",b:"8号人高强度运转，容易把身体信号当作小问题忽视。定期体检、充足睡眠、适度运动——把\"维护自己\"当成管理重要资产来对待。"}],

core:`你是数字9——所有数字的集大成者，1到8的智慧都在你身上留下了印记。你拥有广阔的格局与深厚的悲悯，能理解各种不同的人，能感受各种不同的处境。<br><br><strong>你是天生的智者与引路人。</strong>身边的人常常在不知不觉中被你影响、被你启发。`,

wealth:"你对财富的态度往往超脱，但这也可能让你在物质层面缺乏规划。记住：只有先把自己照顾好，才能真正照顾别人。财富是实现使命的工具，而非目的——但工具也需要认真打磨。",
cb:["3","6","9"],cg:["1","2"],

function reduce(n){while(n>9){n=String(n).split('').reduce((a,b)=>a+parseInt(b),0);}return n;}
function go(n){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('s'+n).classList.add('active');window.scrollTo(0,0);}
function calculate(){
  const y=parseInt(document.getElementById('year').value)||0;
  const m=parseInt(document.getElementById('month').value)||0;
  const d=parseInt(document.getElementById('day').value)||0;
  const name=(document.getElementById('uname').value||'').trim();
  if(!y||!m||!d){showToast('请填写完整的出生日期 ✦');return;}
  if(y<1900||y>2025){showToast('请输入有效的出生年份');return;}
  if(m<1||m>12){showToast('月份应在 1-12 之间');return;}
  if(d<1||d>31){showToast('日期应在 1-31 之间');return;}
  const digits=`${y}${m}${d}`.split('').map(Number);
  const tianfu=digits.reduce((a,b)=>a+b,0);
  const shengming=reduce(tianfu);
  renderResult(name,y,m,d,tianfu,shengming);
  go(2);
}
function renderResult(name,y,m,d,tianfu,shengming){
  const info=D[shengming];
  const dn=name||(y+'年'+m+'月'+d+'日');
  const cb=info.cb.map(n=>`<span class="compat-best">数字${n}·${D[n].name.split('·')[0]}</span>`).join('');
  const cg=info.cg.map(n=>`<span class="compat-good">数字${n}·${D[n].name.split('·')[0]}</span>`).join('');
  const adv=info.advice.map((a,i)=>`<li><span class="advice-num">${['Ⅰ','Ⅱ','Ⅲ','Ⅳ'][i]}</span><span class="advice-body"><strong>${a.t}</strong><span>${a.b}</span></span></li>`).join('');
  document.getElementById('rc').innerHTML=`
  <div class="result-hero">
    <div class="result-name">${dn} 的生命密码</div>
    <div class="num-showcase">
      <div class="num-bubble"><div class="num-big" style="font-size:26px">${tianfu}</div><div class="num-tag">天赋数</div></div>
      <div class="arrow-div">›</div>
      <div class="num-bubble main"><div class="num-big">${shengming}</div><div class="num-tag">生命数</div></div>
    </div>
    <div class="result-title">${info.name}</div>
    <div class="result-keyword">${info.keyword}</div>
  </div>
  <div class="tags-row">${info.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
  <div class="card"><div class="card-title">✦ 你是谁 · 核心能量</div><div class="card-text">${info.core}</div></div>
  <div class="dual-card">
    <div class="dual-card-title">✦ 天赋优势 与 人生课题</div>
    <div class="dual-cols">
      <div><div class="dual-col-label">▲ 天赋与优势</div><div class="dual-col-text">${info.gift}</div></div>
      <div><div class="dual-col-label">▽ 挑战与阴影</div><div class="dual-col-text">${info.shadow}</div></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">✦ 人际关系模式</div>
    <div class="card-text">${info.relation}</div>
    <div class="compat-label">最佳契合数字</div><div class="compat-row">${cb}</div>
    <div class="compat-label">良好相处数字</div><div class="compat-row">${cg}</div>
  </div>
  <div class="dual-card">
    <div class="dual-card-title">✦ 事业方向 与 财富密码</div>
    <div class="dual-cols">
      <div><div class="dual-col-label">事业方向</div><div class="dual-col-text">${info.career}</div></div>
      <div><div class="dual-col-label">财富模式</div><div class="dual-col-text">${info.wealth}</div></div>
    </div>
  </div>
  <div class="section-label">— 给你的四条生命建议 —</div>
  <div class="card"><ul class="advice-list">${adv}</ul></div>
  <div class="section-label">— 分享你的命运数字 —</div>
  <div class="share-card">
    <div class="sc tl"></div><div class="sc tr"></div><div class="sc bl"></div><div class="sc br"></div>
    <div class="share-app">生命数字密码 · NUMEROLOGY</div>
    <div class="share-n">${shengming}</div>
    <div class="share-nl">LIFE NUMBER</div>
    <div class="share-name">${info.name}</div>
    <div class="share-kw">${info.keyword}</div>
    <div class="sdiv"></div>
    <div class="share-bubbles">
      <div class="sb"><div class="sb-n">${tianfu}</div><div class="sb-t">天赋数</div></div>
      <div class="sb"><div class="sb-n">${shengming}</div><div class="sb-t">生命数</div></div>
      <div class="sb"><div class="sb-n">${m}/${d}</div><div class="sb-t">生日</div></div>
    </div>
    <div class="sdiv"></div>
    <div class="share-quote">"${info.quote}"</div>
    <div class="share-footer">✦ 测一测你的生命数字 ✦</div>
  </div>
  <button class="btn-share" onclick="showToast('长按海报截图，发送朋友圈 ✨')">截图保存，分享朋友圈 ✦</button>
  <button class="btn-again" onclick="go(1)">为朋友再测一次</button>`;
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
</html>
