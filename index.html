function rd(n){while(n>9){n=String(n).split('').reduce(function(a,b){return a+parseInt(b);},0);}return n;}
function gtf(tf,d){return d.tfm[String(tf)]||d.tfm["def"];}
function go(n){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById('s'+n).classList.add('active');window.scrollTo(0,0);}

function calc(){
  var y=parseInt(document.getElementById('year').value)||0;
  var m=parseInt(document.getElementById('month').value)||0;
  var dy=parseInt(document.getElementById('day').value)||0;
  var nm=(document.getElementById('uname').value||'').trim();
  if(!y||!m||!dy){showT('请填写完整的出生日期 ✦');return;}
  if(y<1900||y>2025){showT('请输入有效的出生年份');return;}
  if(m<1||m>12){showT('月份应在 1-12 之间');return;}
  if(dy<1||dy>31){showT('日期应在 1-31 之间');return;}
  var digs=(String(y)+String(m)+String(dy)).split('').map(Number);
  var tf=digs.reduce(function(a,b){return a+b;},0);
  var sl=rd(tf);
  render(nm,y,m,dy,tf,sl);
  go(2);
}
